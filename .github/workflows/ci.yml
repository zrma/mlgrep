name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux native prerequisite
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang time

      - name: Install Mallang v1.1.0
        run: scripts/install-mallang-compiler.sh

      - name: Run release checks
        run: scripts/check-release.sh

      - name: Upload platform archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.os }}
          path: target/release-artifact-smoke/first/mlgrep-v*.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release-bundle:
    name: Release checksum bundle
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download platform archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: target/release-input
          merge-multiple: true

      - name: Assemble release bundle
        run: |
          mkdir -p target/release-bundle
          cp target/release-input/*.tar.gz target/release-bundle/
          cp install.sh target/release-bundle/
          python3 scripts/write-release-checksums.py \
            --require-all-targets \
            --output target/release-bundle/SHA256SUMS \
            target/release-bundle/*.tar.gz

      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mlgrep-release
          path: target/release-bundle/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
