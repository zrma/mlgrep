name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux native prerequisite
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang

      - name: Install Mallang v1.0.0
        run: |
          curl -fsSLO https://github.com/zrma/mallang/releases/download/v1.0.0/install.sh
          sh install.sh --version 1.0.0
          "$HOME/.local/bin/mlg" --version

      - name: Run repository checks
        run: scripts/check.sh
