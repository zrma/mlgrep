name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate tag version
        run: |
          version="$(scripts/read-version.sh)"
          test "$GITHUB_REF_NAME" = "v$version"

      - name: Install Linux native prerequisite
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang

      - name: Install Mallang v1.0.0
        run: scripts/install-mallang-compiler.sh

      - name: Run release checks
        run: scripts/check-release.sh

      - name: Upload platform archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: target/release-artifact-smoke/first/mlgrep-v*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download platform archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: target/release-input
          merge-multiple: true

      - name: Assemble release bundle
        run: |
          version="$(scripts/read-version.sh)"
          test "$GITHUB_REF_NAME" = "v$version"
          mkdir -p target/release-bundle
          cp target/release-input/*.tar.gz target/release-bundle/
          cp install.sh target/release-bundle/
          python3 scripts/write-release-checksums.py \
            --require-all-targets \
            --output target/release-bundle/SHA256SUMS \
            target/release-bundle/*.tar.gz

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(scripts/read-version.sh)"
          gh release create "$GITHUB_REF_NAME" \
            target/release-bundle/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --latest \
            --title "mlgrep $version" \
            --notes-file "docs/releases/v$version.md"
