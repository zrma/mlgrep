schema_version: 1
entrypoint: docs/HANDOFF.md
agent_harness: docs/agent-harness.md
status: docs/status.md
roadmap: docs/roadmap.md
consumer_findings: docs/mallang-v1-findings.md
security: SECURITY.md
active_work_glob: docs/todo-*.md

public_dependencies:
  - zrma/mallang

checks:
  full: scripts/check.sh
  release: scripts/check-release.sh
  published_release: scripts/check-published-release.sh
  harness: scripts/check-agent-harness-interface.sh
  publication: scripts/check-publication-boundary.py
  streaming_memory: python3 scripts/measure-streaming-memory.py --binary target/mlgrep --output target/streaming-memory.json --enforce-bounded
  mallang:
    - mlg fmt --check .
    - mlg check .
    - mlg test .
    - mlg build . -o target/mlgrep

vcs:
  local: jj
  change_message: "<type>: <summary>"
  push_requires_explicit_permission: true

release:
  version: VERSION
  targets:
    - aarch64-apple-darwin
    - x86_64-unknown-linux-gnu
  notes: docs/releases/v0.2.0.md
